# Rebuilds the site on a cadence so it picks up STAC catalog changes (new
# datasets, revised variables/extents/prose published by dynamical-org/
# reformatters) even when there's no push to `main`.
#
# The site is built from STAC at build time, so a rebuild = a fresh fetch of
# stac.dynamical.org. This job just pings a Cloudflare Pages *deploy hook*,
# which triggers a production build+deploy from the latest `main`.
#
# Setup (one-time):
#   1. Cloudflare Pages → the dynamical.org project → Settings → Builds &
#      deployments → Deploy hooks → create a hook on the `main` branch.
#   2. Copy its URL into a GitHub repo secret named CF_DEPLOY_HOOK_URL
#      (Settings → Secrets and variables → Actions).
#
# Event-driven alternative: the reformatters STAC-publish pipeline can POST the
# same deploy-hook URL after it publishes, for near-immediate rebuilds instead
# of waiting for the next scheduled run.
name: Scheduled rebuild

on:
  schedule:
    # Daily at 11:00 UTC. Catalog structure changes rarely and temporal extents
    # are open-ended ("Present"), so a daily refresh is ample. Adjust as needed.
    - cron: "0 11 * * *"
  workflow_dispatch: {}

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.CF_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::error::CF_DEPLOY_HOOK_URL secret is not set. See this workflow's header for setup." >&2
            exit 1
          fi
          curl -fsS -X POST "$DEPLOY_HOOK_URL"
          echo "Cloudflare Pages deploy hook triggered."
